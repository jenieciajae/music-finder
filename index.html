<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Finder</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #252A34;
      color: #F8F8F8;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      background: #1b1f27;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      z-index: 1000;
    }

    .navbar h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
    }

    .navbar ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    .navbar a {
      text-decoration: none;
      color: #F8F8F8;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #FF2E63;
    }

    /* HERO */
    .hero {
      height: 90vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 4rem;
      font-family: 'Bebas Neue', sans-serif;
      margin-bottom: 10px;
    }

    .hero p {
      margin-bottom: 20px;
    }

    .btn {
      background: #FF2E63;
      padding: 10px 20px;
      border-radius: 25px;
      text-decoration: none;
      color: white;
    }

    /* SECTIONS */
    section {
      padding: 60px 20px;
      text-align: center;
    }

    h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    /* CARDS */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1b1f27;
      padding: 20px;
      border-radius: 15px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    /* COMMUNITY */
    .community {
      background: #08D9D6;
      color: #000;
    }

    .community input {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 5px;
    }

    .community button {
      padding: 10px 20px;
      border: none;
      background: #FF2E63;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1b1f27;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2>MusicFinder</h2>
    <ul>
      <li><a href="#concerts">Concerts</a></li>
      <li><a href="#venues">Venues</a></li>
      <li><a href="#merch">Merch</a></li>
      <li><a href="#community">Join</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div>
      <h1>Find Your Next Show 🎶</h1>
      <p>Concerts, venues & vibes near you</p>
      <a href="#concerts" class="btn">Explore</a>
    </div>
  </header>

  <!-- CONCERTS -->
  <section id="concerts">
    <h2>Concerts</h2>
    <div class="card-container">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4">
        <h3>Artist Name</h3>
        <p>Date • Location</p>
      </div>
    </div>
  </section>

  <!-- VENUES -->
  <section id="venues">
    <h2>Venues</h2>
    <div class="card-container">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">
        <h3>Venue Name</h3>
      </div>
    </div>
  </section>

  <!-- MERCH -->
  <section id="merch">
    <h2>Merch</h2>
    <div class="card-container">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
        <h3>Artist Merch</h3>
      </div>
    </div>
  </section>

  <!-- COMMUNITY -->
  <section id="community" class="community">
    <h2>Join the Community 🎤</h2>
    <p>Stay updated on concerts & drops</p>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <br>
      <button type="submit">Join Now</button>
    </form>
  </section>

  <footer>
    <p>© 2026 MusicFinder</p>
  </footer>

</body>
</html>
